<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post · RHC</title>
<meta name="description" content="">
<meta property="og:title" content="RHC">
<meta property="og:description" content="">
<meta property="og:type" content="article">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f3ef;
    --accent: #e8ff47;
    --accent2: #00d4aa;
    --mid: #2a2a3a;
    --muted: #6b6b7e;
    --border: rgba(10,10,15,0.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.6rem;
    letter-spacing: -0.04em;
    color: var(--paper);
    text-decoration: none;
  }
  .logo span { color: var(--accent2); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.9rem; font-weight: 500;
    color: rgba(245,243,239,0.6); text-decoration: none;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--paper); }
  .nav-links a.active-link { color: var(--paper); }
  .nav-cta {
    background: var(--ink); color: var(--accent) !important;
    padding: .55rem 1.4rem; border-radius: 100px;
    font-weight: 600 !important; font-size: 0.88rem !important;
    transition: transform .2s, background .2s !important;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .nav-cta:hover { background: var(--mid) !important; transform: scale(1.04); }

  /* ── Mobile nav toggle (checkbox-CSS, no JS) ── */
  .nav-toggle {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }
  .nav-right { display: flex; align-items: center; gap: 2rem; }
  .nav-burger {
    display: none;          /* shown only ≤760px */
    width: 44px; height: 44px;
    cursor: pointer;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px;
    background: transparent; border: 0;
  }
  .nav-burger span {
    display: block;
    width: 22px; height: 2px;
    background: var(--paper);
    border-radius: 2px;
    transition: transform .2s ease, opacity .2s ease;
  }
  .nav-backdrop { display: none; }
  /* Mobile drawer — sibling of <nav>, hidden by default; shown only
     ≤760px. Lives outside <nav> so position:fixed escapes the nav's
     backdrop-filter containing block. */
  .nav-drawer { display: none; }

  /* ── PREVIEW BANNER (only when ?preview=1) ── */
  .preview-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: #efb84a; color: #0a0a0f;
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    text-align: center;
    display: none;
  }

  /* ── HERO ── */
  .post-hero {
    padding: 9rem 4rem 3rem;
    background: var(--ink);
    color: var(--paper);
    position: relative;
  }
  .post-hero-inner { max-width: 720px; margin: 0 auto; text-align: left; }
  .post-cat-pill-hero {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.78rem; font-weight: 600;
    padding: 4px 12px; border-radius: 100px;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 1.2rem;
    background: rgba(255,255,255,.08);
    color: rgba(245,243,239,.85);
  }
  .post-cat-pill-hero .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); }
  .post-hero h1 {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: clamp(2rem, 4.5vw, 3.4rem);
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 1rem;
  }
  .post-hero .subtitle {
    font-size: 1.15rem;
    color: rgba(245,243,239,.7);
    line-height: 1.55;
    margin-bottom: 1.6rem;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }
  .post-hero .meta {
    font-size: 0.85rem;
    color: rgba(245,243,239,.45);
    display: inline-flex; gap: 12px; align-items: center;
    justify-content: flex-start;
  }
  .post-hero .meta .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: rgba(245,243,239,.3); }

  /* ── FEATURED IMAGE ── */
  .post-featured {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 4rem;
    margin-top: 0;
    position: relative;
    z-index: 2;
  }
  .post-featured img {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    border-radius: 18px;
    display: block;
    box-shadow: 0 15px 40px rgba(0,0,0,.1);
  }

  /* ── CONTENT ── */
  .post-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
    font-size: 1.08rem;
    line-height: 1.75;
    color: #1a1a2a;
    flex: 1;
  }
  .post-content h1, .post-content h2, .post-content h3 {
    font-family: 'Syne', sans-serif;
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.25;
  }
  .post-content h1 { font-size: 2rem; margin: 2rem 0 1rem; font-weight: 700; }
  .post-content h2 { font-size: 1.6rem; margin: 1.8rem 0 .9rem; font-weight: 700; }
  .post-content h3 { font-size: 1.3rem; margin: 1.5rem 0 .7rem; font-weight: 600; }
  .post-content p { margin: 0 0 1.2rem; }
  .post-content ul, .post-content ol { margin: 0 0 1.2rem 1.4rem; }
  .post-content li { margin-bottom: .4rem; }
  .post-content blockquote {
    border-left: 3px solid var(--accent2);
    padding: 6px 18px;
    color: var(--muted);
    font-style: italic;
    margin: 1.4rem 0;
  }
  .post-content code {
    background: rgba(10,10,15,.06);
    padding: 2px 7px;
    border-radius: 4px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 0.94em;
  }
  .post-content a { color: #054a3c; text-decoration: underline; text-decoration-color: rgba(0,165,132,.4); }
  .post-content a:hover { text-decoration-color: var(--accent2); }
  .post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 1.4rem 0;
  }
  .post-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  .post-state {
    max-width: 720px;
    margin: 0 auto;
    padding: 8rem 2rem;
    text-align: center;
    flex: 1;
  }
  .post-state-icon {
    font-size: 2.4rem;
    color: var(--accent2);
    margin-bottom: 1rem;
  }
  .post-state h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    margin-bottom: .8rem;
  }
  .post-state p { color: var(--muted); margin-bottom: 1.4rem; }
  .post-state a {
    color: var(--ink);
    background: var(--accent);
    padding: .7rem 1.6rem;
    border-radius: 100px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
  }

  /* ── FOOTER ── */
  footer {
    background: #07070d;
    color: rgba(245,243,239,.4);
    padding: 2.5rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: .82rem;
    border-top: 1px solid rgba(255,255,255,.05);
  }
  footer a { text-decoration: none; transition: color .2s; }

  @media (max-width: 760px) {
    /* Hide the desktop inline link list — the mobile drawer takes over. */
    .nav-links { display: none; }

    /* Show hamburger. */
    .nav-burger { display: flex; }

    /* Slide-in drawer from the right. Body-level sibling of <nav>, so
       top/right/bottom are relative to the viewport — not the nav's
       backdrop-filter containing block. */
    .nav-drawer {
      display: flex;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(82vw, 320px);
      background: rgba(10,10,15,0.98);
      backdrop-filter: blur(14px);
      border-left: 1px solid rgba(255,255,255,0.08);
      flex-direction: column;
      align-items: flex-start;
      gap: 1.4rem;
      padding: 5.5rem 2rem 2rem;
      transform: translateX(100%);
      transition: transform .25s ease;
      z-index: 99;
    }
    #nav-toggle:checked ~ .nav-drawer { transform: translateX(0); }

    /* Link styling inside the drawer — mirrors .nav-links a. */
    .nav-drawer a {
      font-size: 0.9rem; font-weight: 500;
      color: rgba(245,243,239,0.6); text-decoration: none;
      transition: color .2s;
    }
    .nav-drawer a:hover { color: var(--paper); }

    /* Full-screen backdrop behind the drawer — tap to close. */
    .nav-backdrop {
      display: block;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 98;
    }
    #nav-toggle:checked ~ .nav-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    /* Hamburger morphs into ✕ when the menu is open. */
    #nav-toggle:checked ~ nav .nav-burger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #nav-toggle:checked ~ nav .nav-burger span:nth-child(2) { opacity: 0; }
    #nav-toggle:checked ~ nav .nav-burger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    nav, .post-hero, .post-featured, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
    .post-hero { padding-top: 6rem; padding-bottom: 2rem; }
    .post-content { padding: 2rem 1.5rem 3rem; }
    .post-featured { margin-top: 0; padding: 0 1.5rem; }
    .post-featured img { max-height: 220px; }
  }

  /* ── Language toggle (PT / EN) — mirrors index.html ── */
  .lang-toggle { display: flex; align-items: center; gap: 6px; list-style: none; }
  .lang-flag {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 2px 4px;
    font-size: 22px;
    line-height: 1;
    opacity: .5;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s ease, border-color .15s ease;
  }
  .lang-flag:hover { opacity: 1; }
  .lang-flag.active { opacity: 1; border-color: var(--accent2); }
  @media (max-width: 768px) { .lang-flag { font-size: 20px; } }
</style>
</head>
<body>

<div id="preview-banner" class="preview-banner">⚠ Pré-visualização — este post ainda não está publicado</div>

<input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true" tabindex="-1">
<nav>
  <a href="/" class="logo">RH<span>C</span></a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="/" data-i18n="nav.home">Home</a></li>
      <li><a href="/about" data-i18n="nav.about">About Us</a></li>
      <li><a href="/blog" class="active-link" data-i18n="nav.blog">Blog</a></li>

      <button type="button" class="lang-flag" data-lang="pt" aria-label="Português">🇵🇹</button>

    <label for="nav-toggle" class="nav-burger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </label>

</nav>
<!-- Mobile drawer — body-level sibling of <nav>. Lives outside nav so
     position:fixed lands on the viewport, not on the nav's
     backdrop-filter containing block. Mirrors the inline desktop links. -->
<div class="nav-drawer" aria-hidden="true">
  <a href="/" data-i18n="nav.home">Home</a>
  <a href="/about" data-i18n="nav.about">About Us</a>
  <a href="/blog" class="active-link" data-i18n="nav.blog">Blog</a>
  <a href="/#cta" class="nav-cta" data-i18n="nav.cta">Get a Demo</a>
</div>
<label for="nav-toggle" class="nav-backdrop" aria-hidden="true"></label>

<div id="post-root">
  <div class="post-state">
    <div class="post-state-icon">…</div>
    <h2 data-i18n="post.loading">Loading…</h2>
  </div>
</div>

<footer>
  <a href="/" style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--paper);text-decoration:none;letter-spacing:-0.04em;">RH<span style="color:var(--accent2)">C</span></a>
  <div style="display:flex;gap:2rem;flex-wrap:wrap;justify-content:flex-end;margin-left:auto;">
    <a href="/" data-i18n="nav.home" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Home</a>
    <a href="/about" data-i18n="nav.about" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">About Us</a>
    <a href="/blog" data-i18n="nav.blog" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Blog</a>
    <a href="mailto:hello@rhc.pt" data-i18n="footer.contact" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Contact</a>
    <a href="/privacy" data-i18n="footer.privacy" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Privacy</a>
    <a href="/terms" data-i18n="footer.terms" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Terms</a>
  </div>
  <span data-i18n="footer.copyright">© 2026 RHC. All rights reserved.</span>
</footer>

<script>
/* ──────────────────────────────────────────────────────────────
   Single-post page. Loads the row matching ?slug=… and renders.
   Without ?preview=1 we only read status='published' (RLS-enforced).
   With ?preview=1 the same query runs — RLS still blocks unpublished
   rows for anon, so preview only "works" if the user happens to be
   authenticated as a marketing/admin user in this browser. That's
   exactly the case when the editor opens this URL in a new tab.
   ────────────────────────────────────────────────────────────── */
const SUPA_URL = 'https://sgecgsnxljohhfbftevg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnZWNnc254bGpvaGhmYmZ0ZXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzMzNjQsImV4cCI6MjA5MjM0OTM2NH0.Igv5qrLk8NwsheStNv7VY4cvdCO-svEGx6S89OZubps';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ─────────────────────────────────────────────────────────────
   i18n (PT / EN) — same model as index.html / blog.html. The
   post body (title / subtitle / content) stays in its original
   language; the chrome (nav, footer, loading/not-found states,
   'back to blog', date locale, category label) is
   translated. localStorage('rhc_lang') is shared across the
   marketing site so the user's choice persists.
   ───────────────────────────────────────────────────────────── */
const T = {
  pt: {
    'nav.home': 'Home',
    'nav.about': 'Sobre Nós',
    'nav.blog': 'Blog',
    'nav.cta': 'Pedir Demo',
    'footer.copyright': '© 2026 RHC. Todos os direitos reservados.',
    'footer.contact': 'Contacto',
    'footer.privacy': 'Privacidade',
    'footer.terms': 'Termos',
    'blog.cat.ai_screening': 'Triagem com IA',
    'blog.cat.candidate_experience': 'Experiência do candidato',
    'blog.cat.gdpr': 'RGPD',
    'blog.cat.product_updates': 'Atualizações do produto',
    'post.loading': 'A carregar…',
    'post.notfound.title': 'Post não encontrado.',
    'post.notfound.desc': 'O artigo que procuras não está disponível ou foi removido.',
    'post.backToBlog': '← Voltar ao blog'
  },
  en: {
    'nav.home': 'Home',
    'nav.about': 'About Us',
    'nav.blog': 'Blog',
    'nav.cta': 'Get a Demo',
    'footer.copyright': '© 2026 RHC. All rights reserved.',
    'footer.contact': 'Contact',
    'footer.privacy': 'Privacy',
    'footer.terms': 'Terms',
    'blog.cat.ai_screening': 'AI screening',
    'blog.cat.candidate_experience': 'Candidate experience',
    'blog.cat.gdpr': 'GDPR',
    'blog.cat.product_updates': 'Product updates',
    'post.loading': 'Loading…',
    'post.notfound.title': 'Post not found.',
    'post.notfound.desc': "The article you're looking for isn't available or has been removed.",
    'post.backToBlog': '← Back to blog'
  }
};

let LANG = 'en';

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtDate(iso) {
  if(!iso) return '';
  try {
    const locale = LANG === 'pt' ? 'pt-PT' : 'en-GB';
    return new Date(iso).toLocaleDateString(locale, { day:'numeric', month:'short', year:'numeric' });
  } catch(e) { return ''; }
}
function catLabel(slug) {
  return T[LANG]['blog.cat.' + slug] || slug;
}

// Cache the loaded post so language toggles can re-render without
// re-querying Supabase (and without losing the user's scroll spot).
let _postCache = null; // null = loading, 'notfound' = error/missing, object = post row

function renderState() {
  const dict = T[LANG];
  const root = document.getElementById('post-root');
  if(!root) return;
  if(_postCache === null) {
    root.innerHTML = `
      <div class="post-state">
        <div class="post-state-icon">…</div>
        <h2>${escapeHtml(dict['post.loading'])}</h2>
      </div>`;
    return;
  }
  if(_postCache === 'notfound') {
    root.innerHTML = `
      <div class="post-state">
        <div class="post-state-icon">✦</div>
        <h2>${escapeHtml(dict['post.notfound.title'])}</h2>
        <p>${escapeHtml(dict['post.notfound.desc'])}</p>
        <a href="/blog">${escapeHtml(dict['post.backToBlog'])}</a>
      </div>`;
    document.title = dict['post.notfound.title'] + ' · RHC';
    return;
  }
  const p = _postCache;
  // Pick the language-specific column when LANG=en AND it has content,
  // otherwise fall back to the mono column (PT canonical). Mirrors the
  // picker used by the blog feed (Phase 2 step 4a): pre-Phase-2 rows
  // only have mono and render as before; partially-translated rows
  // fall back per-field so an untranslated subtitle alone never
  // blanks the page.
  const isEN = LANG === 'en';
  const title    = (isEN && p.title_en)            ? p.title_en            : (p.title            || '');
  const subtitle = (isEN && p.subtitle_en)         ? p.subtitle_en         : (p.subtitle         || '');
  const content  = (isEN && p.content_en)          ? p.content_en          : (p.content          || '');
  const metaDesc = (isEN && p.meta_description_en) ? p.meta_description_en : (p.meta_description || '');

  const catHtml  = p.category
    ? `<span class="post-cat-pill-hero"><span class="dot"></span>${escapeHtml(catLabel(p.category))}</span>`
    : '';
  const subHtml  = subtitle ? `<p class="subtitle">${escapeHtml(subtitle)}</p>` : '';
  const dateStr  = fmtDate(p.published_at || p.created_at);
  const featured = p.featured_image_url
    ? `<div class="post-featured"><img src="${escapeHtml(p.featured_image_url)}" alt=""></div>`
    : '';
  const safeContent = String(content);

  root.innerHTML = `
    <section class="post-hero">
      <div class="post-hero-inner">
        ${catHtml}
        <h1>${escapeHtml(title)}</h1>
        ${subHtml}
        <div class="meta">
          <span>${dateStr}</span>
        </div>
      </div>
    </section>
    ${featured}
    <article class="post-content">${safeContent}</article>`;

  // Dynamic SEO meta tags. Title and description follow the picked
  // language so the rendered <title>, og:title and og:description
  // always match the rendered <h1> / body.
  document.title = (title || 'RHC') + ' · RHC';
  const setMeta = (name, attr, val) => {
    const sel = `meta[${attr}="${name}"]`;
    let el = document.querySelector(sel);
    if(!el) { el = document.createElement('meta'); el.setAttribute(attr, name); document.head.appendChild(el); }
    el.setAttribute('content', val);
  };
  const desc = (metaDesc || subtitle || '').substring(0, 160);
  setMeta('description', 'name', desc);
  setMeta('og:title',       'property', (title || 'RHC') + ' · RHC');
  setMeta('og:description', 'property', desc);
  setMeta('og:type',        'property', 'article');
  if(p.featured_image_url) setMeta('og:image', 'property', p.featured_image_url);
}

async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const slug = (params.get('slug') || '').trim();
  const isPreview = params.get('preview') === '1';

  if(isPreview) {
    const banner = document.getElementById('preview-banner');
    if(banner) banner.style.display = 'block';
    document.querySelector('nav').style.top = '32px';
  }

  if(!slug) { _postCache = 'notfound'; renderState(); return; }

  try {
    let query = supa.from('blog_posts').select('*').eq('slug', slug);
    if(!isPreview) query = query.eq('status', 'published');
    const { data, error } = await query.maybeSingle();
    if(error) { console.warn('Post fetch error:', error.message); _postCache = 'notfound'; renderState(); return; }
    if(!data)  { _postCache = 'notfound'; renderState(); return; }
    _postCache = data;
    renderState();
  } catch(e) {
    console.warn('Post load failed:', e);
    _postCache = 'notfound';
    renderState();
  }
}

function applyLang(lang) {
  if(lang !== 'pt' && lang !== 'en') lang = 'en';
  LANG = lang;
  const dict = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = dict[el.dataset.i18n]; if(v != null) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = dict[el.dataset.i18nHtml]; if(v != null) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = dict[el.dataset.i18nPlaceholder]; if(v != null) el.placeholder = v;
  });
  document.documentElement.lang = lang;
  try { localStorage.setItem('rhc_lang', lang); } catch(e) {}
  document.querySelectorAll('.lang-flag').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  // Re-render the dynamic post body so fmtDate / category label /
  // back-to-blog reflect the new language.
  renderState();
}

const _initialLang = (() => {
  let stored = null;
  try { stored = localStorage.getItem('rhc_lang'); } catch(e) {}
  if(stored === 'pt' || stored === 'en') return stored;
  const browserLang = ((navigator.language || '') + '').toLowerCase();
  return browserLang.startsWith('pt') ? 'pt' : 'en';
})();
document.querySelectorAll('.lang-flag').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang));
});
applyLang(_initialLang);
loadPost();
</script>
