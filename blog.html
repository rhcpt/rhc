<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · RHC</title>
<meta name="description" content="On hiring, AI, GDPR and building RHC — insights and product updates from the RHC team.">
<meta property="og:title" content="Blog · RHC">
<meta property="og:description" content="On hiring, AI, and the messy bits in between.">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f3ef;
    --accent: #e8ff47;
    --accent2: #00d4aa;
    --mid: #2a2a3a;
    --muted: #6b6b7e;
    --border: rgba(10,10,15,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.6rem;
    letter-spacing: -0.04em;
    color: var(--paper);
    text-decoration: none;
  }
  .logo span { color: var(--accent2); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.9rem; font-weight: 500;
    color: rgba(245,243,239,0.6); text-decoration: none;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--paper); }
  .nav-links a.active-link { color: var(--paper); }
  .nav-cta {
    background: var(--ink); color: var(--accent) !important;
    padding: .55rem 1.4rem; border-radius: 100px;
    font-weight: 600 !important; font-size: 0.88rem !important;
    transition: transform .2s, background .2s !important;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .nav-cta:hover { background: var(--mid) !important; transform: scale(1.04); }

  /* ── HERO ── */
  .blog-hero {
    padding: 10rem 4rem 5rem;
    background: var(--ink);
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }
  .blog-hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 60% at 70% 30%, rgba(0,212,170,.15), transparent 60%),
      radial-gradient(ellipse 40% 50% at 15% 80%, rgba(232,255,71,.07), transparent 60%);
    pointer-events: none;
  }
  .blog-hero-grid {
    position: absolute; inset: 0; opacity: .25;
    background-image:
      linear-gradient(rgba(245,243,239,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,243,239,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .blog-hero-content {
    max-width: 950px;
    position: relative;
    z-index: 1;
  }
  .blog-tag {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    padding: 0.5rem 1rem;
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 100px;
    margin-bottom: 2rem;
  }
  .blog-hero h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 3.6vw, 3.2rem);
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }
  .blog-hero h1 em {
    font-style: normal;
    font-weight: 800;
    color: var(--accent2);
  }
  .blog-hero p.lead {
    font-size: clamp(1.05rem, 1.6vw, 1.3rem);
    line-height: 1.6;
    color: rgba(245,243,239,0.7);
    max-width: 700px;
    font-weight: 300;
    margin-bottom: 2.5rem;
  }

  /* Topics chips inside hero */
  .topics-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    align-items: center;
    max-width: 720px;
  }
  .topics-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,243,239,0.4);
    margin-right: 0.4rem;
  }
  .topic-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.95rem;
    border-radius: 100px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(245,243,239,0.85);
  }
  .topic-chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .topic-chip .dot.c1 { background: #00d4aa; }
  .topic-chip .dot.c2 { background: #e8ff47; }
  .topic-chip .dot.c3 { background: #00aaff; }
  .topic-chip .dot.c4 { background: #ff6496; }

  /* ── MAIN AREA ── */
  .blog-main {
    flex: 1;
    padding: 6rem 4rem;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .blog-empty {
    max-width: 580px;
    text-align: center;
  }
  .blog-empty-icon {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--accent2);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 2rem;
  }
  .blog-empty h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.4rem, 2.4vw, 2rem);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.8rem;
  }
  .blog-empty p {
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .blog-empty a {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 1rem 2.5rem;
    border-radius: 100px;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    transition: transform .2s, background .2s;
  }
  .blog-empty a:hover {
    background: var(--mid);
    transform: scale(1.03);
  }

  /* Posts grid - kept ready for when posts exist */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .post-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: transform .25s, box-shadow .25s;
    cursor: pointer;
  }
  .post-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.08);
  }
  .post-image {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, #00d4aa 0%, #007a63 100%);
    background-size: cover;
    background-position: center;
  }
  .post-content { padding: 1.8rem 1.6rem 2rem; }
  .post-meta {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 8px;
  }
  .post-cat-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.7rem; font-weight: 600;
    padding: 2px 9px; border-radius: 100px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .post-cat-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .post-cat-pill.cat-ai_screening { background: rgba(0,212,170,.12); color: #0F6E56; }
  .post-cat-pill.cat-ai_screening .dot { background: #00a584; }
  .post-cat-pill.cat-candidate_experience { background: rgba(55,138,221,.12); color: #1e4d8f; }
  .post-cat-pill.cat-candidate_experience .dot { background: #378ADD; }
  .post-cat-pill.cat-gdpr { background: rgba(239,159,39,.14); color: #854F0B; }
  .post-cat-pill.cat-gdpr .dot { background: #EF9F27; }
  .post-cat-pill.cat-product_updates { background: rgba(178,100,224,.12); color: #6a2da5; }
  .post-cat-pill.cat-product_updates .dot { background: #B264E0; }
  .post-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    line-height: 1.25;
    margin-bottom: 0.8rem;
    letter-spacing: -0.01em;
  }
  .post-excerpt {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .blog-loading { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 0.95rem; }

  /* ── FOOTER ── */
  footer {
    background: #07070d;
    color: rgba(245,243,239,.4);
    padding: 2.5rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: .82rem;
    border-top: 1px solid rgba(255,255,255,.05);
  }
  footer a { text-decoration: none; transition: color .2s; }

  @media (max-width: 760px) {
    .nav-links { display: none; }
    nav, .blog-hero, .blog-main, footer {
      padding-left: 1.5rem; padding-right: 1.5rem;
    }
    .blog-hero { padding-top: 7rem; padding-bottom: 4rem; }
    .topics-label { width: 100%; margin-bottom: 0.2rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="logo">RH<span>C</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/about.html">About Us</a></li>
    <li><a href="/blog.html" class="active-link">Blog</a></li>
    <li><a href="/#cta" class="nav-cta">Get a Demo</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="blog-hero">
  <div class="blog-hero-grid"></div>
  <div class="blog-hero-content">
    <span class="blog-tag">Blog</span>
    <h1>All about <em>RHC</em></h1>
    <p class="lead">Insights, playbooks and product updates from the team building RHC.</p>

    <div class="topics-row">
      <span class="topics-label">We'll be writing about:</span>
      <span class="topic-chip"><span class="dot c1"></span>AI screening</span>
      <span class="topic-chip"><span class="dot c2"></span>Candidate experience</span>
      <span class="topic-chip"><span class="dot c3"></span>GDPR &amp; candidates</span>
    </div>
  </div>
</section>

<!-- MAIN - dynamic grid populated from Supabase blog_posts (status=published). -->
<section class="blog-main">
  <div id="blog-content">
    <div class="blog-loading">Loading…</div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <a href="/" style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--paper);text-decoration:none;letter-spacing:-0.04em;">RH<span style="color:var(--accent2)">C</span></a>
  <div style="display:flex;gap:2rem;flex-wrap:wrap;justify-content:flex-end;margin-left:auto;">
    <a href="/" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Home</a>
    <a href="/about.html" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">About Us</a>
    <a href="/blog.html" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Blog</a>
    <a href="/cdn-cgi/l/email-protection#28404d444447685a404b06585c" style="color:rgba(245,243,239,.4);" onmouseover="this.style.color='var(--paper)'" onmouseout="this.style.color='rgba(245,243,239,.4)'">Contact</a>
  </div>
  <span>© 2026 RHC. All rights reserved.</span>
</footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>

<script>
/* ──────────────────────────────────────────────────────────────
   Public blog feed. RLS policy `blog_posts_anon_published` lets
   anon read rows with status='published', which is exactly what
   we render here.
   ────────────────────────────────────────────────────────────── */
const SUPA_URL = 'https://sgecgsnxljohhfbftevg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnZWNnc254bGpvaGhmYmZ0ZXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzMzNjQsImV4cCI6MjA5MjM0OTM2NH0.Igv5qrLk8NwsheStNv7VY4cvdCO-svEGx6S89OZubps';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const CATEGORY_LABELS = {
  ai_screening:         'AI screening',
  candidate_experience: 'Candidate experience',
  gdpr:                 'GDPR',
  product_updates:      'Product updates'
};

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtDate(iso) {
  if(!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  } catch(e) { return '—'; }
}
function readTime(content) {
  const tmp = document.createElement('div');
  tmp.innerHTML = String(content || '');
  const words = (tmp.textContent || '').trim().split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 200));
}

async function loadPosts() {
  const container = document.getElementById('blog-content');
  try {
    const { data, error } = await supa
      .from('blog_posts')
      .select('id,title,subtitle,slug,featured_image_url,category,published_at,author_name,content')
      .eq('status', 'published')
      .order('published_at', { ascending: false });

    if(error) throw error;
    const posts = data || [];

    if(posts.length === 0) {
      container.innerHTML = `
        <div class="blog-empty">
          <div class="blog-empty-icon">✦</div>
          <h2>Coming soon.</h2>
          <p>We're putting the finishing touches on our first articles. Subscribe or check back soon — the first post is almost ready.</p>
        </div>`;
      return;
    }

    container.innerHTML = '<div class="posts-grid">' + posts.map(p => {
      const catPill = p.category
        ? `<span class="post-cat-pill cat-${escapeHtml(p.category)}"><span class="dot"></span>${escapeHtml(CATEGORY_LABELS[p.category] || p.category)}</span>`
        : '';
      const imgStyle = p.featured_image_url
        ? `style="background-image:url('${escapeHtml(p.featured_image_url)}');"`
        : '';
      const subtitle = p.subtitle || '';
      return `
        <article class="post-card" onclick="window.location='/post.html?slug=${encodeURIComponent(p.slug)}'">
          <div class="post-image" ${imgStyle}></div>
          <div class="post-content">
            <div class="post-meta">
              ${catPill}
              <span>${fmtDate(p.published_at)} · ${readTime(p.content)} min read</span>
            </div>
            <h3 class="post-title">${escapeHtml(p.title)}</h3>
            <p class="post-excerpt">${escapeHtml(subtitle)}</p>
          </div>
        </article>`;
    }).join('') + '</div>';

  } catch(e) {
    console.warn('Failed to load posts:', e);
    container.innerHTML = `
      <div class="blog-empty">
        <div class="blog-empty-icon">⚠</div>
        <h2>Something went wrong.</h2>
        <p>We couldn't load the posts right now. Please try again in a moment.</p>
      </div>`;
  }
}

loadPosts();
</script>

</body>
</html>
