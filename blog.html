<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · RHC</title>
<meta name="description" content="On hiring, AI, GDPR and building RHC — insights and product updates from the RHC team.">
<meta property="og:title" content="Blog · RHC">
<meta property="og:description" content="On hiring, AI, and the messy bits in between.">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f3ef;
    --accent: #e8ff47;
    --accent2: #00d4aa;
    --mid: #2a2a3a;
    --muted: #6b6b7e;
    --border: rgba(10,10,15,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.6rem;
    letter-spacing: -0.04em;
    color: var(--paper);
    text-decoration: none;
  }
  .logo span { color: var(--accent2); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.9rem; font-weight: 500;
    color: rgba(245,243,239,0.6); text-decoration: none;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--paper); }
  .nav-links a.active-link { color: var(--paper); }
  .nav-cta {
    background: var(--ink); color: var(--accent) !important;
    padding: .55rem 1.4rem; border-radius: 100px;
    font-weight: 600 !important; font-size: 0.88rem !important;
    transition: transform .2s, background .2s !important;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .nav-cta:hover { background: var(--mid) !important; transform: scale(1.04); }

  /* ── HERO ── */
  .blog-hero {
    padding: 10rem 4rem 5rem;
    background: var(--ink);
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }
  .blog-hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 60% at 70% 30%, rgba(0,212,170,.15), transparent 60%),
      radial-gradient(ellipse 40% 50% at 15% 80%, rgba(232,255,71,.07), transparent 60%);
    pointer-events: none;
  }
  .blog-hero-grid {
    position: absolute; inset: 0; opacity: .25;
    background-image:
      linear-gradient(rgba(245,243,239,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,243,239,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .blog-hero-content {
    max-width: 950px;
    position: relative;
    z-index: 1;
  }
  .blog-tag {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    padding: 0.5rem 1rem;
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 100px;
    margin-bottom: 2rem;
  }
  .blog-hero h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    /* Lower max so the longer PT title ("Tudo sobre RHC") fits on a single
       line within .blog-hero-content's 950px width. The vw-based middle
       lets the size scale down on narrower viewports so nowrap never
       pushes the text past the hero edge. */
    font-size: clamp(1.5rem, 4.5vw, 2.8rem);
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
    white-space: nowrap;
  }
  .blog-hero h1 em {
    font-style: normal;
    font-weight: 800;
    color: var(--accent2);
  }
  .blog-hero p.lead {
    font-size: clamp(1.05rem, 1.6vw, 1.3rem);
    line-height: 1.6;
    color: rgba(245,243,239,0.7);
    max-width: 700px;
    font-weight: 300;
    margin-bottom: 2.5rem;
  }

  /* ── MAIN AREA ── */
  .blog-main {
    flex: 1;
    padding: 6rem 4rem;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Category-filter chips — sit ABOVE #blog-content so they survive
     the renderPosts() innerHTML wipe. Width and centering mirror the
     posts-grid so chips and cards line up. */
  .blog-controls {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto 2.5rem;
  }
  .blog-search {
    position: relative;
    max-width: 520px;
    margin: 0 auto 1.25rem;
  }
  .blog-search-icon {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--muted);
    pointer-events: none;
  }
  .blog-search input {
    width: 100%;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 12px 18px 12px 44px;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  .blog-search input::placeholder { color: var(--muted); }
  .blog-search input:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(0,0,0,.05);
  }
  /* Native clear button styling for type=search — paper/ink instead of OS default. */
  .blog-search input::-webkit-search-cancel-button { cursor: pointer; }
  .blog-cat-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .blog-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
  }
  .blog-chip:hover { border-color: var(--ink); }
  .blog-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .blog-chip[data-cat="ai_screening"] .dot       { background: #00a584; }
  .blog-chip[data-cat="candidate_experience"] .dot { background: #378ADD; }
  .blog-chip[data-cat="gdpr"] .dot               { background: #EF9F27; }
  .blog-chip[data-cat="product_updates"] .dot    { background: #B264E0; }
  .blog-chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .blog-chip.active .dot { background: var(--accent2); }
  .blog-empty .blog-clear-btn {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.9rem 2rem;
    border-radius: 100px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform .2s, background .2s;
  }
  .blog-empty .blog-clear-btn:hover { background: var(--mid); transform: scale(1.03); }

  .blog-empty {
    max-width: 580px;
    text-align: center;
  }
  .blog-empty-icon {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--accent2);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 2rem;
  }
  .blog-empty h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.4rem, 2.4vw, 2rem);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.8rem;
  }
  .blog-empty p {
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .blog-empty a {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 1rem 2.5rem;
    border-radius: 100px;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    transition: transform .2s, background .2s;
  }
  .blog-empty a:hover {
    background: var(--mid);
    transform: scale(1.03);
  }

  /* Posts grid - kept ready for when posts exist */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .post-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: transform .25s, box-shadow .25s;
    cursor: pointer;
    /* Fixed total height so PT and EN render at exactly the same size,
       regardless of how long the subtitle/excerpt text is. Sums:
         .post-image                                 = 200px
         .post-content padding 1.8rem + 2rem         = 60.8px
         .post-meta row + margin                     ≈ 32px
         .post-title (nowrap, 1 line) + margin       ≈ 34px
         .post-excerpt min-height 3.2em (2 lines)    ≈ 48.6px
       Natural total ≈ 375px; 380 leaves a 5px sub-pixel cushion. The
       title (nowrap+ellipsis) and excerpt (line-clamp 2 + min-height
       3.2em) below ensure the content always fits — overflow:hidden
       above keeps any edge-case overrun from escaping the card. */
    display: flex;
    flex-direction: column;
    height: 380px;
  }
  .post-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.08);
  }
  .post-image {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, #00d4aa 0%, #007a63 100%);
    background-size: cover;
    background-position: center;
  }
  .post-content { padding: 1.8rem 1.6rem 2rem; }
  .post-meta {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 8px;
  }
  .post-cat-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.7rem; font-weight: 600;
    padding: 2px 9px; border-radius: 100px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .post-cat-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .post-cat-pill.cat-ai_screening { background: rgba(0,212,170,.12); color: #0F6E56; }
  .post-cat-pill.cat-ai_screening .dot { background: #00a584; }
  .post-cat-pill.cat-candidate_experience { background: rgba(55,138,221,.12); color: #1e4d8f; }
  .post-cat-pill.cat-candidate_experience .dot { background: #378ADD; }
  .post-cat-pill.cat-gdpr { background: rgba(239,159,39,.14); color: #854F0B; }
  .post-cat-pill.cat-gdpr .dot { background: #EF9F27; }
  .post-cat-pill.cat-product_updates { background: rgba(178,100,224,.12); color: #6a2da5; }
  .post-cat-pill.cat-product_updates .dot { background: #B264E0; }
  .post-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    /* Sized so the longer PT title ("Lançamento da RHC") fits on a single
       line inside .post-content at the 320px grid minimum; nowrap + ellipsis
       guard against any future longer title without breaking layout. */
    font-size: 1.05rem;
    line-height: 1.25;
    margin-bottom: 0.8rem;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .post-excerpt {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    /* Clamp to 2 lines and reserve the same vertical box in both languages
       — line-height 1.6 × 2 = 3.2em. PT (longer) gets truncated with "…",
       EN (shorter) keeps the same space so the cards align. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 3.2em;
  }
  .blog-loading { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 0.95rem; }

  /* ── FOOTER ── */
  footer {
    background: #07070d;
    color: rgba(245,243,239,.4);
    padding: 2.5rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: .82rem;
    border-top: 1px solid rgba(255,255,255,.05);
  }
  footer a { text-decoration: none; transition: color .2s; }

  @media (max-width: 760px) {
    .nav-links { display: none; }
    nav, .blog-hero, .blog-main, footer {
      padding-left: 1.5rem; padding-right: 1.5rem;
    }
    .blog-hero { padding-top: 7rem; padding-bottom: 4rem; }
    /* Narrow viewports get a tighter clamp so nowrap PT title still fits
       — content area shrinks to ~272px at 320px viewport, well above the
       title's rendered width at this size. */
    .blog-hero h1 { font-size: clamp(1.2rem, 5.5vw, 1.9rem); }
  }

  /* ── Language toggle (PT / EN) — mirrors index.html ── */
  .lang-toggle { display: flex; align-items: center; gap: 6px; list-style: none; }
  .lang-flag {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 2px 4px;
    font-size: 22px;
    line-height: 1;
    opacity: .5;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s ease, border-color .15s ease;
  }
  .lang-flag:hover { opacity: 1; }
  .lang-flag.active { opacity: 1; border-color: var(--accent2); }
  @media (max-width: 768px) { .lang-flag { font-size: 20px; } }
</style>
</head>

    'blog.cat.candidate_experience': 'Candidate experience',
    'blog.cat.gdpr': 'GDPR',
    'blog.cat.product_updates': 'Product updates',
    'blog.loading': 'Loading…',
    'blog.empty.title': 'Coming soon.',
    'blog.empty.desc': "We're putting the finishing touches on our first articles. Subscribe or check back soon — the first post is almost ready.",
    'blog.error.title': 'Something went wrong.',
    'blog.error.desc': "We couldn't load the posts right now. Please try again in a moment.",
    'blog.filter.all': 'All',
    'blog.filter.empty.title': 'No results',
    'blog.filter.empty.desc': 'No posts in this category.',
    'blog.filter.clear': 'Clear filters',
    'blog.search.placeholder': 'Search articles…'
  }
};

let LANG = 'en';

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtDate(iso) {
  if(!iso) return '—';
  try {
    const locale = LANG === 'pt' ? 'pt-PT' : 'en-GB';
    return new Date(iso).toLocaleDateString(locale, { day:'numeric', month:'short', year:'numeric' });
  } catch(e) { return '—'; }
}
function catLabel(slug) {
  return T[LANG]['blog.cat.' + slug] || slug;
}

// Cache the last fetch so language toggles can re-render without re-querying
// Supabase (and without flashing the loading state).
let _postsCache = null;

// Active category filter — 'all' or one of the BD category slugs. Slug is
// language-independent (mono column), so this filter respects the bilingual
// picker for free: applyLang re-translates chip labels but does not touch
// the filter state.
let _catFilt = 'all';
let _searchQ = '';

// Strip HTML for the search haystack so queries don't match raw tag names
// like "h2" or "strong" that live inside the contenteditable HTML.
function _stripHtml(html) {
  if(!html) return '';
  try {
    return (new DOMParser()).parseFromString(String(html), 'text/html').body.textContent || '';
  } catch(e) { return String(html); }
}

function _applyFilters(posts) {
  const q = _searchQ.trim().toLowerCase();
  const isEN = LANG === 'en';
  return posts.filter(p => {
    if(_catFilt !== 'all' && p.category !== _catFilt) return false;
    if(!q) return true;
    // Same PT/EN fallback chain renderPosts uses for cards — search hits
    // whatever the visitor is actually reading.
    const title    = (isEN && p.title_en)    ? p.title_en    : (p.title    || '');
    const subtitle = (isEN && p.subtitle_en) ? p.subtitle_en : (p.subtitle || '');
    const content  = (isEN && p.content_en)  ? p.content_en  : (p.content  || '');
    const catLbl   = p.category ? catLabel(p.category) : '';
    const hay = (title + ' ' + subtitle + ' ' + _stripHtml(content) + ' ' + catLbl).toLowerCase();
    return hay.includes(q);
  });
}

function _setCatFilter(slug) {
  _catFilt = slug;
  document.querySelectorAll('.blog-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === slug);
  });
  renderPosts();
}
// Exposed for the inline onclick on the "Clear filters" button rendered
// inside the filtered-empty state HTML. Resets BOTH dimensions of the
// filter (category and search) and empties the visible input so the user
// sees a clean slate.
window._blogClearFilters = () => {
  _searchQ = '';
  const _si = document.getElementById('blog-search-input');
  if(_si) _si.value = '';
  _setCatFilter('all');
};

function renderPosts() {
  const container = document.getElementById('blog-content');
  if(!container) return;
  const dict = T[LANG];
  if(_postsCache === 'error') {
    container.innerHTML = `
      <div class="blog-empty">
        <div class="blog-empty-icon">⚠</div>
        <h2>${escapeHtml(dict['blog.error.title'])}</h2>
        <p>${escapeHtml(dict['blog.error.desc'])}</p>
      </div>`;
    return;
  }
  if(!Array.isArray(_postsCache)) {
    container.innerHTML = `<div class="blog-loading">${escapeHtml(dict['blog.loading'])}</div>`;
    return;
  }
  if(_postsCache.length === 0) {
    container.innerHTML = `
      <div class="blog-empty">
        <div class="blog-empty-icon">✦</div>
        <h2>${escapeHtml(dict['blog.empty.title'])}</h2>
        <p>${escapeHtml(dict['blog.empty.desc'])}</p>
      </div>`;
    return;
  }
  // Cache has posts; apply the active filter. If the filter wiped them
  // all, show the 4th state with a Clear button that drops back to 'all'.
  const _filtered = _applyFilters(_postsCache);
  if(_filtered.length === 0) {
    container.innerHTML = `
      <div class="blog-empty">
        <div class="blog-empty-icon">✦</div>
        <h2>${escapeHtml(dict['blog.filter.empty.title'])}</h2>
        <p>${escapeHtml(dict['blog.filter.empty.desc'])}</p>
        <button type="button" class="blog-clear-btn" onclick="_blogClearFilters()">${escapeHtml(dict['blog.filter.clear'])}</button>
      </div>`;
    return;
  }
  const isEN = LANG === 'en';
  container.innerHTML = '<div class="posts-grid">' + _filtered.map(p => {
    // Pick the language-specific column when LANG=en AND it has content,
    // otherwise fall back to the mono column (PT canonical). Posts written
    // before Phase 2 only have the mono columns; posts written after have
    // both but may not have been translated yet — both cases land on PT
    // gracefully so the public feed never goes blank.
    const title    = (isEN && p.title_en)    ? p.title_en    : (p.title    || '');
    const subtitle = (isEN && p.subtitle_en) ? p.subtitle_en : (p.subtitle || '');
    const catPill = p.category
      ? `<span class="post-cat-pill cat-${escapeHtml(p.category)}"><span class="dot"></span>${escapeHtml(catLabel(p.category))}</span>`
      : '';
    const imgStyle = p.featured_image_url
      ? `style="background-image:url('${escapeHtml(p.featured_image_url)}');"`
      : '';
    return `
      <article class="post-card" onclick="window.location='/post.html?slug=${encodeURIComponent(p.slug)}'">
        <div class="post-image" ${imgStyle}></div>
        <div class="post-content">
          <div class="post-meta">
            ${catPill}
            <span>${fmtDate(p.published_at)}</span>
          </div>
          <h3 class="post-title">${escapeHtml(title)}</h3>
          <p class="post-excerpt">${escapeHtml(subtitle)}</p>
        </div>
      </article>`;
  }).join('') + '</div>';
}

async function loadPosts() {
  try {
    const { data, error } = await supa
      .from('blog_posts')
      .select('id,title,subtitle,slug,featured_image_url,category,published_at,author_name,content,title_en,subtitle_en,content_en')
      .eq('status', 'published')
      .order('published_at', { ascending: false });
    if(error) throw error;
    _postsCache = data || [];
  } catch(e) {
    console.warn('Failed to load posts:', e);
    _postsCache = 'error';
  }
  renderPosts();
}

function applyLang(lang) {
  if(lang !== 'pt' && lang !== 'en') lang = 'en';
  LANG = lang;
  const dict = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = dict[el.dataset.i18n]; if(v != null) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = dict[el.dataset.i18nHtml]; if(v != null) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = dict[el.dataset.i18nPlaceholder]; if(v != null) el.placeholder = v;
  });
  document.documentElement.lang = lang;
  if(dict['title.blog']) document.title = dict['title.blog'];
  try { localStorage.setItem('rhc_lang', lang); } catch(e) {}
  document.querySelectorAll('.lang-flag').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  // Re-render the dynamically built post grid so fmtDate / category
  // labels reflect the new language.
  renderPosts();
}

const _initialLang = (() => {
  let stored = null;
  try { stored = localStorage.getItem('rhc_lang'); } catch(e) {}
  if(stored === 'pt' || stored === 'en') return stored;
  const browserLang = ((navigator.language || '') + '').toLowerCase();
  return browserLang.startsWith('pt') ? 'pt' : 'en';
})();
document.querySelectorAll('.lang-flag').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang));
});
document.querySelectorAll('.blog-chip').forEach(b => {
  b.addEventListener('click', () => _setCatFilter(b.dataset.cat));
});
(() => {
  const _si = document.getElementById('blog-search-input');
  if(!_si) return;
  let _t = null;
  _si.addEventListener('input', () => {
    if(_t) clearTimeout(_t);
    _t = setTimeout(() => { _searchQ = _si.value; renderPosts(); }, 150);
  });
})();
applyLang(_initialLang);
loadPosts();
</script>

</body>
</html>
